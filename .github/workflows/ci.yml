name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-node:
    name: Node 24
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Restore spec cache
        id: spec-cache
        uses: actions/cache@v5
        with:
          path: .local/spec-cache
          key: spec-cache-${{ runner.os }}-${{ hashFiles('src/spec/**/*.json', 'scripts/fetch-spec.ts') }}

      - name: Log spec cache status
        run: |
          if [ "${{ steps.spec-cache.outputs.cache-hit }}" = "true" ]; then
            echo "spec-cache: hit"
          else
            echo "spec-cache: miss"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Fetch spec artifacts
        run: npm run fetch-spec

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run coverage

      - name: Upload coverage reports to Codecov
        if: ${{ success() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
