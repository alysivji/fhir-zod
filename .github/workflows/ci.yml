name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-node:
    name: Node 24 / ${{ matrix.zod-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zod-version:
          - 3.25.1
          - 4

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Restore spec cache
        id: spec-cache
        uses: actions/cache@v5
        with:
          path: .local/spec-cache
          key: spec-cache-${{ runner.os }}-${{ hashFiles('src/spec/**/*.json', 'scripts/fetch-spec.ts') }}

      - name: Log spec cache status
        run: |
          if [ "${{ steps.spec-cache.outputs.cache-hit }}" = "true" ]; then
            echo "spec-cache: hit"
          else
            echo "spec-cache: miss"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Select Zod version
        run: npm install --no-save --package-lock=false zod@${{ matrix.zod-version }}

      - name: Fetch spec artifacts
        run: npm run fetch-spec -- stu3 r4 r4b r5

      - name: Build
        run: npm run build

      - name: Upload bundle analysis to Codecov
        if: ${{ matrix.zod-version == '4' }}
        env:
          BUNDLE_ANALYZER_UPLOAD_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -z "$BUNDLE_ANALYZER_UPLOAD_TOKEN" ]; then
            echo "Skipping bundle analysis upload because CODECOV_TOKEN is not set."
            exit 0
          fi
          npm run codecov:bundle

      - name: Test with coverage
        if: ${{ matrix.zod-version == '4' }}
        run: npm run coverage

      - name: Test
        if: ${{ matrix.zod-version != '4' }}
        run: npm test

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() && matrix.zod-version == '4' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.zod-version == '4' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./test-results/vitest.junit.xml
          fail_ci_if_error: false
