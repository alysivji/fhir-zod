name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-node:
    name: Node 24
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Restore spec cache
        uses: actions/cache@v5
        with:
          path: .local/spec-cache
          key: spec-cache-${{ runner.os }}-${{ hashFiles('src/spec/**/*.json', 'scripts/fetch-spec.ts') }}

      - name: Install dependencies
        run: npm ci

      - name: Fetch spec artifacts
        run: npm run fetch-spec

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
